{% extends 'base.html' %}
{% load static %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-icon"><i class="fa fa-magnifying-glass" style="color: #3b82f6;"></i></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-actions">
        <a href="{% url 'shop:home' %}" class="btn-primary">Go Home</a>
        <a href="{% url 'items:product_list' %}" class="btn-outline">Browse Products</a>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.error-page { text-align: center; padding: 80px 20px; min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.error-icon { font-size: 4rem; margin-bottom: 20px; }
.error-page h1 { font-size: 2rem; margin: 0 0 10px; }
.error-page p { color: #666; max-width: 500px; margin-bottom: 30px; }
.error-actions { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
.btn-primary, .btn-outline { padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; }
.btn-primary { background: #2874f0; color: white; }
.btn-outline { border: 2px solid #2874f0; color: #2874f0; }
</style>
{% endblock %}
